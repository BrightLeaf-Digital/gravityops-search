name: Check with PCP and maybe Deploy to WordPress.org
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: false
  push:
    tags:
      - '*'
jobs:
  trigger-workflow:
    uses: BrightLeaf-Digital/.github/.github/workflows/pcp-check.yml@main
    with:
      plugin_slug: 'gravityops-search'
      deploy_to_wp: true
      deploy_to_freemius: false
      update_feed_item_key: 'gravops_search'
      version: ${{ github.event.inputs.version }}
      zip_files: 'assets includes vendor *.php readme.txt composer.json'
    secrets:
      BLD_API_KEY: ${{ secrets.BLD_API_KEY }}
      UPDATE_FEED_URL: ${{ secrets.UPDATE_FEED_URL }}
      WP_SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
      WP_SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
      SSH_PRIVATE_KEY_GRAVITYOPS_CORE: ${{ secrets.SSH_PRIVATE_KEY_GRAVITYOPS_CORE }}
